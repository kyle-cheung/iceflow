name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Show cargo version
        run: cargo --version
      - name: Run workspace tests
        run: cargo test --workspace

  real-stack:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Prepare local stack env
        run: cp infra/local/.env.example infra/local/.env
      - name: Validate compose config
        run: docker compose --env-file infra/local/.env -f infra/local/docker-compose.yml config >/dev/null
      - name: Start local Polaris stack
        run: docker compose --env-file infra/local/.env -f infra/local/docker-compose.yml up -d --wait
      - name: Run raw object-store probe
        run: docker compose --env-file infra/local/.env -f infra/local/docker-compose.yml --profile verify run --rm --no-deps object-store-probe
      - name: Run real-stack smoke tests
        run: |
          . infra/local/.env
          POLARIS_CATALOG_URI="http://127.0.0.1:${POLARIS_API_PORT}/api/catalog" \
          POLARIS_CATALOG_NAME="${POLARIS_CATALOG_NAME}" \
          POLARIS_NAMESPACE="${POLARIS_NAMESPACE}" \
          POLARIS_CLIENT_ID="${POLARIS_ROOT_CLIENT_ID}" \
          POLARIS_CLIENT_SECRET="${POLARIS_ROOT_CLIENT_SECRET}" \
          cargo test -p iceflow-sink real_stack_ -- --ignored
      - name: Stop local Polaris stack
        if: always()
        run: docker compose --env-file infra/local/.env -f infra/local/docker-compose.yml down -v
